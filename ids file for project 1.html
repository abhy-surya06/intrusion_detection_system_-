<!DOCTYPE html>
<html>
<head>
    <title>SentinelShield Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Arial; margin: 20px; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .container { max-width: 1200px; margin: auto; }
    </style>
</head>
<body>
<div class="container">
    <h1>SentinelShield - Intrusion Detection Dashboard</h1>

    <h2>Attack Statistics</h2>
    <canvas id="statsChart" width="400" height="200"></canvas>

    <h2>Recent Logs</h2>
    <table>
        <thead>
            <tr><th>Time</th><th>IP</th><th>Method</th><th>URL</th><th>Attack Type</th><th>Blocked</th><th>Details</th></tr>
        </thead>
        <tbody id="logTable">
        </tbody>
    </table>
</div>

<script>
    // Fetch stats and render pie chart
    fetch('/api/stats')
        .then(res => res.json())
        .then(data => {
            const labels = data.map(row => row[0]);
            const values = data.map(row => row[1]);
            const ctx = document.getElementById('statsChart').getContext('2d');
            new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: labels,
                    datasets: [{
                        data: values,
                        backgroundColor: ['#ff6384', '#36a2eb', '#ffce56', '#4bc0c0']
                    }]
                }
            });
        });

    // Fetch logs and populate table
    fetch('/api/logs')
        .then(res => res.json())
        .then(logs => {
            const tbody = document.getElementById('logTable');
            logs.forEach(log => {
                const row = tbody.insertRow();
                row.insertCell(0).innerText = new Date(log[1]*1000).toLocaleString();
                row.insertCell(1).innerText = log[2];
                row.insertCell(2).innerText = log[3];
                row.insertCell(3).innerText = log[4];
                row.insertCell(4).innerText = log[5];
                row.insertCell(5).innerText = log[6] ? "Yes" : "No";
                row.insertCell(6).innerText = log[7];
            });
        });
</script>
</body>
</html>
